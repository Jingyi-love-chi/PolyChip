# TSVRA 配置文件示例

# 层数（默认: 2）
num_layers = 2

# 网格因子（网格大小 = 4 * grid_factor，默认: 4）
grid_factor = 4

# 失效模式: a=仅初始化失效, b=仅运行时失效, c=混合失效（默认: a）
failure_mode = c

# TSV失效率（默认: 1e-3）
failure_rate = 1e-9

# 垂直传输延迟（默认: 1）
vertical_delay = 1

# 水平传输延迟（默认: 1000）
horizontal_delay = 1000

# 仿真周期数（默认: 10^7）
simulation_cycles = 10000000

# 输出文件前缀（默认: tsvra_output）
output_prefix = tsvra_output

# 随机数种子（0表示使用随机设备，默认: 0）
random_seed = 0

# 拥塞权重λ1（默认: 0.0，0表示禁用拥塞感知路由）
# lambda1 = 0.0

# 风险权重λ2（默认: 0.0，0表示禁用风险感知路由）
# lambda2 = 0.0

# 最大路径跳数L_max（默认: 0，0表示不限制）
# max_path_length = 0

# 最小路径可靠性R_min（默认: 0.0，0表示不约束）
# reliability_min = 0.0

